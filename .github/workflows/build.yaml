name: Build
on:
  push:
    branches:
      - main
      - development
      - 'story/**'
    paths-ignore:
      - 'demo-app/**'
  pull_request:
    branches:
      - main
      - development
    paths-ignore:
      - 'demo-app/**'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Commit Lint
        uses: wagoid/commitlint-github-action@v5
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          check-latest: true
      - name: Get dependencies
        run: go mod download
      - name: Build
        run: make build
      - name: Test
        run: |
          make test
          make vet
      - name: Verify all test packages executed
        run: |
          echo "Verifying all test packages were executed..."
          LOCALBIN="$(pwd)/bin"
          export KUBEBUILDER_ASSETS="$($LOCALBIN/setup-envtest use 1.30.x --bin-dir $LOCALBIN -p path)"
          TEST_OUTPUT=$(go test ./... 2>&1)
          echo "$TEST_OUTPUT"
          TEST_COUNT=$(echo "$TEST_OUTPUT" | grep -E "^(ok|FAIL|\?)" | wc -l | tr -d ' ')
          echo ""
          echo "Total test packages executed: $TEST_COUNT"
          echo "Expected packages with tests: 9"
          if [ "$TEST_COUNT" -lt "9" ]; then
            echo "ERROR: Expected at least 9 test packages, found $TEST_COUNT"
            echo "This indicates not all tests are running in CI"
            exit 1
          fi
          echo "✓ All test packages executed successfully"
      - name: Lint
        uses: dominikh/staticcheck-action@v1
        with:
          version: "2024.1.1"
          install-go: false
